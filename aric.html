<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <style>
        .box1{
            display: grid;
            grid-template-columns: repeat( auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }
        .cg{
            background-color: #44d4b2;
            height: 100px;
            border-radius: 20px;
            text-align: center;
            line-height: 100px;
        }
    </style>
</head>
<body>
    <div class="box1">
        <div class="cg">1</div>
        <div class="cg">2</div>
        <div class="cg">3</div>
        <div class="cg">4</div>
        <div class="cg">5</div>
        <div class="cg">6</div>
        <div class="cg">7</div>
        <div class="cg">8</div>
        <div class="cg">9</div>
        <div class="cg">10</div>
    </div>
</body>
</html>
