worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # 请求体限制
    client_max_body_size    50m;
    client_body_buffer_size 10m;

    # Gzip 压缩
    gzip on;
    gzip_min_length 1k;
    gzip_buffers    4 16k;
    gzip_comp_level 4;
    gzip_types text/plain application/javascript application/x-javascript
               text/css application/xml text/javascript application/json
               image/svg+xml;
    gzip_vary on;

    # ============ HTTP → HTTPS 强制跳转 ============
    server {
        listen 80;
        server_name ariconline.top www.ariconline.top;
        # 301 永久重定向到 HTTPS
        return 301 https://$host$request_uri;
    }

    # ============ HTTPS 主站 ============
    server {
        listen 443 ssl;
        server_name ariconline.top www.ariconline.top;

        # SSL 证书（由 docker-compose 挂载到容器内）
        ssl_certificate     /etc/ssl/certs/ariconline.top.pem;
        ssl_certificate_key /etc/ssl/certs/ariconline.top.key;

        # SSL 协议和加密套件
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers on;

        # SSL 会话缓存（提升性能）
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # HSTS（浏览器强制 HTTPS，首次部署生效后再开启）
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # 安全响应头
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-XSS-Protection "1; mode=block";

        # 静态资源（表情包等）
        location /static/ {
            alias /usr/share/nginx/static/;
            expires 30d;
            access_log off;
        }

        # 前台
        location / {
            root  /usr/share/nginx/blog;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # 后台管理（部署在 /admin 路径下）
        location /admin {
            alias /usr/share/nginx/admin/;
            index index.html;
            try_files $uri $uri/ /admin/index.html;
        }

        # API 反向代理到后端
        location ^~ /api/ {
            proxy_pass http://blog-server:8000/;
            proxy_set_header Host             $host;
            proxy_set_header X-Real-IP        $remote_addr;
            proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # SSE 支持（AI 对话流式输出）
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
        }

        # WebSocket 聊天室代理（HTTPS 下自动升级为 wss://）
        location /websocket {
            proxy_pass http://blog-server:8000/websocket;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host             $host;
            proxy_set_header X-Real-IP        $remote_addr;
            proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
    }
}
