[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --alluredir=reports/allure-results
    --clean-alluredir
    -p no:warnings
markers =
    smoke: 冒烟测试（核心功能快速验证）
    regression: 回归测试（全量测试）
    login: 需要登录的测试
    guest: 游客可执行的测试
    navigation: 导航相关测试
    responsive: 响应式测试
